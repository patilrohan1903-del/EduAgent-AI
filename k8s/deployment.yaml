apiVersion: apps/v1
kind: Deployment
metadata:
  name: eduagent-ai-deployment
  labels:
    app: eduagent-ai
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: eduagent-ai
  template:
    metadata:
      labels:
        app: eduagent-ai
    spec:
      containers:
      - name: eduagent-ai-container
        image: eduagent-ai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: eduagent-secrets
              key: GROQ_API_KEY
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: eduagent-secrets
              key: MONGO_URI
        - name: MONGO_DB_NAME
          valueFrom:
            secretKeyRef:
              name: eduagent-secrets
              key: MONGO_DB_NAME
